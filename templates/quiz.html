{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card fancy-card shadow-lg border-0">
            <div class="card-body p-5">
                <div id="quiz-header" class="d-flex justify-content-between mb-4 border-bottom pb-2">
                    <h5 class="fw-bold text-muted">Question <span id="q-current">1</span> of <span id="q-total">0</span></h5>
                    <h5 class="fw-bold text-primary">Score: <span id="q-score">0</span></h5>
                </div>
                
                <h3 id="question-text" class="mb-4 fw-bold">Loading questions...</h3>
                
                <div id="options-container" class="d-grid gap-3 mb-4">
                    </div>

                <div id="explanation-box" class="alert alert-info d-none"></div>

                <button id="next-btn" class="btn btn-primary w-100 py-3 fw-bold d-none">Next Question</button>
            </div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='quiz.js') }}"></script>
{% endblock %}
