{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card fancy-card shadow border-0">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 fw-bold text-primary">Create Account</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Choose a Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Create a Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Sign Up</button>
                </form>
                <p class="text-center mt-3">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
